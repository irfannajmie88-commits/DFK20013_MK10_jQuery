<!DOCTYPE html>
<html>
<head>
    <title>Login DFK20013</title>

    <!-- jQuery Mobile Theme (ThemeRoller) -->
    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>

    <!-- jQuery Mobile -->
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

    <!-- External JS -->
    <script src="script.js"></script>
</head>

<body>

<!-- ================= PAGE 1: LOGIN ================= -->
<div data-role="page" id="loginPage" data-theme="b">

    <div data-role="header">
        <h1>Login Sistem</h1>
    </div>

    <div data-role="main" class="ui-content">

        <form id="loginForm">

            <label>Username:</label>
            <input type="text" id="username" placeholder="Masukkan username">

            <label>Password:</label>
            <input type="password" id="password" placeholder="Masukkan password">

            <button type="submit" class="ui-btn ui-btn-b ui-corner-all">
                Login
            </button>

        </form>

    </div>

    <div data-role="footer" data-position="fixed">
        <h4>Kelas DFK20013 - 2026</h4>
    </div>

    <!-- POPUP -->
    <div data-role="popup" id="popupError" data-theme="a" class="ui-corner-all">

        <div data-role="header" data-theme="b">
            <h1>Ralat</h1>
        </div>

        <div data-role="main" class="ui-content">
            <p>Sila isi username & password</p>
            <a href="#" data-rel="back" class="ui-btn ui-btn-b ui-corner-all">OK</a>
        </div>

    </div>

</div>


<!-- ================= PAGE 2: DASHBOARD ================= -->
<div data-role="page" id="homePage" data-theme="a">

    <div data-role="header">
        <h1>Dashboard</h1>
    </div>

    <div data-role="main" class="ui-content">
        <h2>Login Berjaya 🎉</h2>
        <p>Selamat datang ke sistem!</p>

        <a href="#loginPage" class="ui-btn ui-btn-inline ui-btn-b">
            Logout
        </a>
    </div>

    <div data-role="footer" data-position="fixed">
        <h4>DFK20013</h4>
    </div>

</div>

</body>
</html>
